workflows:
  ios-app-store:
    name: ParkSafe SF — App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      vars:
        XCODE_PROJECT: "ParkSafeSF/ParkSafeSF.xcodeproj"
        XCODE_SCHEME: "ParkSafeSF"
        BUNDLE_ID: "com.rambitllc.parksafesf"
        APP_STORE_ISSUER_ID: "84975076-bb2f-40b1-a26e-8b515e393aeb"
        APP_STORE_KEY_ID: "HLBLS7U5B2"
        APP_STORE_PRIVATE_KEY: |
          -----BEGIN PRIVATE KEY-----
          MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQgAwDwUCu7dxeC9q2k
          91bvdnZH+HQBXUf+6bj6yvUgPjqgCgYlKoZIzj0DAQehRANCAA3qNBqoOdF8qJn
          z2lLOCT0GTHkrt/sQJRi+YYlxJ97JBLGCj+bwNZKzNBSlNgE1Ewu8O0jOLd2MFq6
          GlTi+UR6
          -----END PRIVATE KEY-----
        APPLE_TEAM_ID: "8R3A53R86P"
      xcode: latest

    scripts:
      - name: Unzip project
        script: |
          if [ -f "ParkSafeSF.zip" ]; then
            unzip -o ParkSafeSF.zip
            echo "Unzipped successfully"
            ls -la
          else
            echo "No zip found, listing files:"
            ls -la
          fi

      - name: Set up App Store Connect API key
        script: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_KEY_ID.p8

      - name: Set bundle identifier
        script: |
          cd ParkSafeSF
          /usr/libexec/PlistBuddy -c \
            "Set :CFBundleIdentifier $BUNDLE_ID" \
            ParkSafeSF/Info.plist
          echo "Bundle ID set to: $BUNDLE_ID"

      - name: Build and archive
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/ParkSafeSF.xcarchive" \
            clean archive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_KEY_ID.p8 \
            -authenticationKeyID "$APP_STORE_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_ISSUER_ID"

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/ParkSafeSF.xcarchive" \
            -exportPath "$CM_EXPORT_DIR" \
            -exportOptionsPlist /dev/stdin \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_KEY_ID.p8 \
            -authenticationKeyID "$APP_STORE_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_ISSUER_ID" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF

    artifacts:
      - $CM_EXPORT_DIR/*.ipa
      - $CM_BUILD_DIR/*.xcarchive

    publishing:
      app_store_connect:
        api_key: $APP_STORE_PRIVATE_KEY
        key_id: $APP_STORE_KEY_ID
        issuer_id: $APP_STORE_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: false
