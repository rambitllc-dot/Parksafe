workflows:
  ios-app-store:
    name: ParkSafe — App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios
      vars:
        XCODE_SCHEME: "ParkSafeSF"
        BUNDLE_ID: "com.rambitllc.parksafe"
      xcode: latest

    scripts:
      - name: Unzip project
        script: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -1)
          if [ -n "$ZIP_FILE" ]; then
            unzip -o "$ZIP_FILE"
          else
            echo "No zip found!" && exit 1
          fi

      - name: Fix project
        script: |
          PROJECT="ParkSafeSF/ParkSafeSF"
          if [ -f "CityStore.swift" ]; then
            cp CityStore.swift "$PROJECT/Services/CityStore.swift"
          fi
          cat > "$PROJECT/ParkSafeSFApp.swift" << 'SWIFT_EOF'
          import SwiftUI
          import UserNotifications
          @main
          struct ParkSafeSFApp: App {
              @StateObject private var scheduleStore       = ScheduleStore()
              @StateObject private var locationManager     = LocationManager()
              @StateObject private var notificationManager = NotificationManager()
              @AppStorage("hasCompletedOnboarding") private var hasCompletedOnboarding = false
              var body: some Scene {
                  WindowGroup {
                      Group {
                          if hasCompletedOnboarding {
                              ContentView()
                          } else {
                              OnboardingView(hasCompletedOnboarding: $hasCompletedOnboarding)
                          }
                      }
                      .environmentObject(scheduleStore)
                      .environmentObject(locationManager)
                      .environmentObject(notificationManager)
                  }
              }
          }
          SWIFT_EOF

          python3 << 'PYEOF'
          with open('ParkSafeSF/ParkSafeSF.xcodeproj/project.pbxproj', 'r') as f:
              content = f.read()
          if 'CityStore' not in content:
              content = content.replace(
                  'A2000003 /* ScheduleStore.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = ScheduleStore.swift; sourceTree = "<group>"; };',
                  'A2000003 /* ScheduleStore.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = ScheduleStore.swift; sourceTree = "<group>"; };\n\t\tA2000008 /* CityStore.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = CityStore.swift; sourceTree = "<group>"; };'
              )
              content = content.replace(
                  'A1000003 /* ScheduleStore.swift in Sources */ = {isa = PBXBuildFile; fileRef = A2000003; };',
                  'A1000003 /* ScheduleStore.swift in Sources */ = {isa = PBXBuildFile; fileRef = A2000003; };\n\t\tA1000008 /* CityStore.swift in Sources */ = {isa = PBXBuildFile; fileRef = A2000008; };'
              )
              content = content.replace('A2000003 /* ScheduleStore.swift */,', 'A2000003 /* ScheduleStore.swift */,\n\t\t\t\tA2000008 /* CityStore.swift */,')
              content = content.replace('A1000003 /* ScheduleStore.swift in Sources */,', 'A1000003 /* ScheduleStore.swift in Sources */,\n\t\t\t\tA1000008 /* CityStore.swift in Sources */,')
          import re
          content = re.sub(r'PRODUCT_BUNDLE_IDENTIFIER = [^;]+;', 'PRODUCT_BUNDLE_IDENTIFIER = com.rambitllc.parksafe;', content)
          with open('ParkSafeSF/ParkSafeSF.xcodeproj/project.pbxproj', 'w') as f:
              f.write(content)
          print('Project file patched')
          PYEOF

      - name: Set up App Store Connect API key
        script: |
          mkdir -p ~/.appstoreconnect/private_keys
          KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_KEY_ID.p8
          printf '%s' "$APP_STORE_PRIVATE_KEY" > "$KEY_PATH"
          echo "Key size: $(wc -c < $KEY_PATH) bytes"

      - name: Create Distribution cert and App Store profile
        script: |
          python3 << 'PYEOF'
          import jwt, time, json, urllib.request, base64, subprocess, os, sys

          key_id = os.environ['APP_STORE_KEY_ID']
          issuer_id = os.environ['APP_STORE_ISSUER_ID']
          team_id = os.environ['APPLE_TEAM_ID']
          bundle_id = os.environ['BUNDLE_ID']
          key_path = os.path.expanduser(f"~/.appstoreconnect/private_keys/AuthKey_{key_id}.p8")

          with open(key_path) as f:
              private_key = f.read()

          def get_token():
              return jwt.encode(
                  {"iss": issuer_id, "iat": int(time.time()), "exp": int(time.time()) + 1200, "aud": "appstoreconnect-v1"},
                  private_key, algorithm="ES256", headers={"kid": key_id}
              )

          def api_get(path):
              req = urllib.request.Request(
                  f"https://api.appstoreconnect.apple.com{path}",
                  headers={"Authorization": f"Bearer {get_token()}"}
              )
              return json.loads(urllib.request.urlopen(req).read())

          def api_post(path, data):
              req = urllib.request.Request(
                  f"https://api.appstoreconnect.apple.com{path}",
                  data=json.dumps(data).encode(),
                  headers={"Authorization": f"Bearer {get_token()}", "Content-Type": "application/json"}
              )
              return json.loads(urllib.request.urlopen(req).read())

          def api_delete(path):
              req = urllib.request.Request(
                  f"https://api.appstoreconnect.apple.com{path}",
                  headers={"Authorization": f"Bearer {get_token()}"},
                  method="DELETE"
              )
              urllib.request.urlopen(req)

          # 1. Delete existing Distribution certificates
          print("Checking for existing Distribution certificates...")
          certs = api_get('/v1/certificates?filter[certificateType]=IOS_DISTRIBUTION')
          for cert in certs.get('data', []):
              cert_id = cert['id']
              print(f"Deleting existing Distribution cert: {cert_id}")
              try:
                  api_delete(f'/v1/certificates/{cert_id}')
                  print(f"Deleted cert {cert_id}")
              except Exception as e:
                  print(f"Could not delete cert {cert_id}: {e}")

          # 2. Generate CSR + private key
          subprocess.run(['openssl', 'genrsa', '-out', '/tmp/dist_key.pem', '2048'], check=True)
          subprocess.run(['openssl', 'req', '-new', '-key', '/tmp/dist_key.pem',
                          '-out', '/tmp/dist_csr.pem',
                          '-subj', '/CN=ParkSafe Distribution/O=Rambit LLC/C=US'], check=True)

          with open('/tmp/dist_csr.pem') as f:
              csr = f.read()
          csr_b64 = base64.b64encode(csr.encode()).decode().replace('\n', '')

          # 3. Create new Distribution certificate
          print("Creating new Distribution certificate...")
          cert_resp = api_post('/v1/certificates', {
              "data": {
                  "type": "certificates",
                  "attributes": {
                      "certificateType": "IOS_DISTRIBUTION",
                      "csrContent": csr_b64
                  }
              }
          })
          cert_content = cert_resp['data']['attributes']['certificateContent']
          cert_id = cert_resp['data']['id']
          cert_bytes = base64.b64decode(cert_content)
          with open('/tmp/dist_cert.cer', 'wb') as f:
              f.write(cert_bytes)
          subprocess.run(['security', 'import', '/tmp/dist_cert.cer', '-k', '/Library/Keychains/System.keychain', '-T', '/usr/bin/codesign'], check=False)
          subprocess.run(['security', 'import', '/tmp/dist_key.pem', '-k', '/Library/Keychains/System.keychain', '-T', '/usr/bin/codesign'], check=False)
          print(f"Distribution certificate created: {cert_id}")

          # 4. Find bundle ID record
          print("Finding bundle ID...")
          bundles = api_get('/v1/bundleIds?filter[identifier]=com.rambitllc.parksafe&filter[platform]=IOS')
          if not bundles['data']:
              print("Bundle ID not found!")
              sys.exit(1)
          bundle_record_id = bundles['data'][0]['id']
          print(f"Bundle ID record: {bundle_record_id}")

          # 5. Delete existing App Store profiles for this bundle
          print("Cleaning up old provisioning profiles...")
          profiles = api_get(f'/v1/profiles?filter[profileType]=IOS_APP_STORE&filter[bundleId]={bundle_record_id}')
          for profile in profiles.get('data', []):
              try:
                  api_delete(f'/v1/profiles/{profile["id"]}')
                  print(f"Deleted old profile: {profile['id']}")
              except Exception as e:
                  print(f"Could not delete profile: {e}")

          # 6. Create new App Store provisioning profile
          print("Creating App Store provisioning profile...")
          profile_resp = api_post('/v1/profiles', {
              "data": {
                  "type": "profiles",
                  "attributes": {
                      "name": "ParkSafe App Store Profile",
                      "profileType": "IOS_APP_STORE"
                  },
                  "relationships": {
                      "bundleId": {"data": {"type": "bundleIds", "id": bundle_record_id}},
                      "certificates": {"data": [{"type": "certificates", "id": cert_id}]},
                      "devices": {"data": []}
                  }
              }
          })
          profile_content = profile_resp['data']['attributes']['profileContent']
          profile_bytes = base64.b64decode(profile_content)
          profile_path = os.path.expanduser('~/Library/MobileDevice/Provisioning Profiles/parksafe_appstore.mobileprovision')
          os.makedirs(os.path.dirname(profile_path), exist_ok=True)
          with open(profile_path, 'wb') as f:
              f.write(profile_bytes)
          print(f"App Store profile installed!")
          print("SUCCESS: Ready to build and export!")
          PYEOF

      - name: Build and archive
        script: |
          KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_KEY_ID.p8
          XCODE_PROJECT=$(find . -name "*.xcodeproj" -maxdepth 5 | head -1)
          echo "Building: $XCODE_PROJECT"
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$CM_BUILD_DIR/ParkSafe.xcarchive" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            clean archive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration \
            -authenticationKeyPath "$KEY_PATH" \
            -authenticationKeyID "$APP_STORE_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_ISSUER_ID"

      - name: Export and upload IPA
        script: |
          KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_KEY_ID.p8

          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/ParkSafe.xcarchive" \
            -exportPath "$CM_EXPORT_DIR" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_PATH" \
            -authenticationKeyID "$APP_STORE_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_ISSUER_ID"

          IPA=$(find "$CM_EXPORT_DIR" -name "*.ipa" | head -1)
          echo "Uploading: $IPA"
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APP_STORE_KEY_ID" \
            --apiIssuer "$APP_STORE_ISSUER_ID" \
            --private-key-path "$KEY_PATH"

    artifacts:
      - $CM_EXPORT_DIR/*.ipa
      - $CM_BUILD_DIR/*.xcarchive

    publishing:
      app_store_connect:
        api_key: $APP_STORE_PRIVATE_KEY
        key_id: $APP_STORE_KEY_ID
        issuer_id: $APP_STORE_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: false
