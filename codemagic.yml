workflows:
  ios-app-store:
    name: ParkSafe App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios
      vars:
        XCODE_SCHEME: "ParkSafeSF"
        BUNDLE_ID: "com.rambitllc.parksafe"
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.rambitllc.parksafe

    scripts:
      - name: Unzip project
        script: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -1)
          echo "Found zip: $ZIP_FILE"
          unzip -o "$ZIP_FILE"
          find . -maxdepth 4 -name "*.xcodeproj" | head -5

      - name: Bump version and build number
        script: |
          INFO_PLIST=$(find . -name "Info.plist" -not -path "*__MACOSX*" -not -path "*Pods*" | head -1)
          echo "Found: $INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.1" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 9" "$INFO_PLIST"
          echo "Version: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' $INFO_PLIST)"
          echo "Build: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' $INFO_PLIST)"

      - name: Copy CityStore
        script: |
          XCODEPROJ=$(find . -maxdepth 4 -name "*.xcodeproj" | grep -v "__MACOSX" | head -1)
          PROJECT_ROOT=$(dirname "$XCODEPROJ")
          APP_DIR="$PROJECT_ROOT/ParkSafeSF"
          if [ -f "CityStore.swift" ]; then
            cp CityStore.swift "$APP_DIR/Services/CityStore.swift"
            echo "CityStore copied"
          fi

      - name: Patch project and write app files
        script: |
          python3 patch_project.py

      - name: Set up App Store Connect API key
        script: |
          mkdir -p ~/.appstoreconnect/private_keys
          KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_KEY_ID.p8
          printf '%s' "$APP_STORE_PRIVATE_KEY" > "$KEY_PATH"
          echo "Key size: $(wc -c < $KEY_PATH) bytes"

      - name: Build and archive
        script: |
          KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_KEY_ID.p8
          XCODEPROJ=$(find . -maxdepth 4 -name "*.xcodeproj" | grep -v "__MACOSX" | head -1)
          PROFILE=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" 2>/dev/null | head -1)
          UUID=$(security cms -D -i "$PROFILE" 2>/dev/null | python3 -c "import sys,plistlib; d=plistlib.loads(sys.stdin.buffer.read()); print(d['UUID'])" 2>/dev/null)
          echo "Building: $XCODEPROJ  Profile: $UUID"
          xcodebuild \
            -project "$XCODEPROJ" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$CM_BUILD_DIR/ParkSafe.xcarchive" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            clean archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$UUID" \
            OTHER_CODE_SIGN_FLAGS="--keychain /Library/Keychains/System.keychain" \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
            COPY_PHASE_STRIP=NO \
            STRIP_INSTALLED_PRODUCT=NO
          echo "Archive: $(du -sh $CM_BUILD_DIR/ParkSafe.xcarchive)"

      - name: Export IPA
        script: |
          PROFILE=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" 2>/dev/null | head -1)
          UUID=$(security cms -D -i "$PROFILE" 2>/dev/null | python3 -c "import sys,plistlib; d=plistlib.loads(sys.stdin.buffer.read()); print(d['UUID'])" 2>/dev/null)
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key><string>manual</string>
            <key>uploadSymbols</key><true/>
            <key>compileBitcode</key><false/>
            <key>provisioningProfiles</key>
            <dict><key>com.rambitllc.parksafe</key><string>$UUID</string></dict>
          </dict></plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/ParkSafe.xcarchive" \
            -exportPath "$CM_EXPORT_DIR" \
            -exportOptionsPlist /tmp/ExportOptions.plist
          IPA=$(find "$CM_EXPORT_DIR" -name "*.ipa" | head -1)
          echo "IPA: $IPA  Size: $(du -sh $IPA)"

    artifacts:
      - $CM_EXPORT_DIR/*.ipa
      - $CM_BUILD_DIR/*.xcarchive

    publishing:
      app_store_connect:
        api_key: $APP_STORE_PRIVATE_KEY
        key_id: $APP_STORE_KEY_ID
        issuer_id: $APP_STORE_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
