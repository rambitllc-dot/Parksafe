workflows:
  ios-app-store:
    name: ParkSafe — App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios
      vars:
        XCODE_SCHEME: "ParkSafeSF"
        BUNDLE_ID: "com.rambitllc.parksafe"
      xcode: latest

    scripts:
      - name: Unzip project
        script: |
          if [ -f "ParkSafe.zip" ]; then
            unzip -o ParkSafe.zip
            echo "Unzipped ParkSafe.zip"
          elif [ -f "ParkSafeSF.zip" ]; then
            unzip -o ParkSafeSF.zip
            echo "Unzipped ParkSafeSF.zip"
          else
            echo "No zip found"
          fi

          echo "=== Looking for xcodeproj ==="
          find . -name "*.xcodeproj" -maxdepth 4 2>/dev/null
          echo "=== Root contents ==="
          ls -la
          echo "=== ParkSafeSF contents ==="
          ls -la ParkSafeSF/ 2>/dev/null || echo "No ParkSafeSF folder at root"

      - name: Set up App Store Connect API key
        script: |
          mkdir -p ~/.appstoreconnect/private_keys
          KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_KEY_ID.p8
          printf '%s' "$APP_STORE_PRIVATE_KEY" > "$KEY_PATH"
          echo "Key size: $(wc -c < $KEY_PATH) bytes"
          echo "First line: $(head -1 $KEY_PATH)"

      - name: Build and archive
        script: |
          KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_KEY_ID.p8

          # The xcodeproj is inside ParkSafeSF/ after unzipping
          XCODE_PROJECT="ParkSafeSF/ParkSafeSF.xcodeproj"

          # Verify it exists
          if [ ! -d "$XCODE_PROJECT" ]; then
            echo "Project not found at $XCODE_PROJECT, searching..."
            XCODE_PROJECT=$(find . -name "*.xcodeproj" -maxdepth 4 | head -1)
            echo "Found at: $XCODE_PROJECT"
          fi

          echo "Building: $XCODE_PROJECT"

          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$CM_BUILD_DIR/ParkSafe.xcarchive" \
            clean archive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_PATH" \
            -authenticationKeyID "$APP_STORE_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_ISSUER_ID"

      - name: Export IPA
        script: |
          KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_KEY_ID.p8

          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/ParkSafe.xcarchive" \
            -exportPath "$CM_EXPORT_DIR" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_PATH" \
            -authenticationKeyID "$APP_STORE_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_ISSUER_ID" \
            -exportOptionsPlist /dev/stdin <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

    artifacts:
      - $CM_EXPORT_DIR/*.ipa
      - $CM_BUILD_DIR/*.xcarchive

    publishing:
      app_store_connect:
        api_key: $APP_STORE_PRIVATE_KEY
        key_id: $APP_STORE_KEY_ID
        issuer_id: $APP_STORE_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: false
