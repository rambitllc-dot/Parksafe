workflows:
  ios-app-store:
    name: ParkSafe — App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios
      vars:
        XCODE_SCHEME: "ParkSafeSF"
        BUNDLE_ID: "com.rambitllc.parksafe"
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.rambitllc.parksafe

    scripts:
      - name: Unzip project
        script: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -1)
          echo "Found zip: $ZIP_FILE"
          unzip -o "$ZIP_FILE"
          echo "=== After unzip ==="
          ls -la
          find . -maxdepth 4 -name "*.xcodeproj" | head -5

      - name: Bump version and build number
        script: |
          INFO_PLIST=$(find . -name "Info.plist" -not -path "*__MACOSX*" -not -path "*Pods*" | head -1)
          echo "Found: $INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.1" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 9" "$INFO_PLIST"
          echo "Version: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' $INFO_PLIST)"
          echo "Build: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' $INFO_PLIST)"

      - name: Fix project
        script: |
          # Find project root dynamically
          XCODEPROJ=$(find . -maxdepth 4 -name "*.xcodeproj" | grep -v "__MACOSX" | head -1)
          PROJECT_ROOT=$(dirname "$XCODEPROJ")
          APP_DIR="$PROJECT_ROOT/ParkSafeSF"
          echo "Project root: $PROJECT_ROOT"
          echo "App dir: $APP_DIR"

          # Copy CityStore if needed
          if [ -f "CityStore.swift" ]; then
            cp CityStore.swift "$APP_DIR/Services/CityStore.swift"
            echo "CityStore copied"
          fi

          # Copy ParkingDetector
          if [ -f "ParkingDetector.swift" ]; then
            cp ParkingDetector.swift "$APP_DIR/Services/ParkingDetector.swift"
            echo "ParkingDetector copied"
          fi

          # Copy ParkingDebugView
          if [ -f "ParkingDebugView.swift" ]; then
            cp ParkingDebugView.swift "$APP_DIR/Views/ParkingDebugView.swift"
            echo "ParkingDebugView copied"
          fi

          # Copy updated ParkSafeSFApp
          if [ -f "ParkSafeSFApp.swift" ]; then
            cp ParkSafeSFApp.swift "$APP_DIR/ParkSafeSFApp.swift"
            echo "ParkSafeSFApp copied"
          fi

          # Write ParkSafeSFApp.swift with ParkingDetector embedded inside same file
          cat > "$APP_DIR/ParkSafeSFApp.swift" << 'SWIFT_EOF'
import SwiftUI
import UserNotifications
import CoreLocation
import CoreMotion

// MARK: - ParkingDetector
class ParkingDetector: NSObject, ObservableObject, CLLocationManagerDelegate {
    static let shared = ParkingDetector()
    private let locationManager = CLLocationManager()
    private let motionManager   = CMMotionActivityManager()
    private let defaults        = UserDefaults.standard
    private var wasInCar        = false
    private let kLat    = "parksafe_lat"
    private let kLon    = "parksafe_lon"
    private let kStreet = "parksafe_street"
    private let kTime   = "parksafe_time"
    @Published var parkedCoordinate: CLLocationCoordinate2D?
    @Published var parkedStreetName: String = "Not detected yet"
    @Published var parkedAt: Date?
    @Published var isParked: Bool = false
    @Published var debugLog: [String] = []
    override init() {
        super.init()
        locationManager.delegate = self
        locationManager.desiredAccuracy = kCLLocationAccuracyBest
        loadSaved()
        log("ParkingDetector initialized")
    }
    func log(_ msg: String) {
        let t = DateFormatter.localizedString(from: Date(), dateStyle: .none, timeStyle: .medium)
        let e = "[\(t)] \(msg)"
        print("ParkSafe: \(e)")
        DispatchQueue.main.async {
            self.debugLog.insert(e, at: 0)
            if self.debugLog.count > 50 { self.debugLog.removeLast() }
        }
    }
    func requestPermissions() {
        log("Requesting location permissions...")
        locationManager.requestWhenInUseAuthorization()
    }
    func startMonitoring() {
        log("Starting CLVisit + CoreMotion monitoring...")
        locationManager.startMonitoringVisits()
        guard CMMotionActivityManager.isActivityAvailable() else {
            log("CoreMotion not available")
            return
        }
        motionManager.startActivityUpdates(to: .main) { [weak self] activity in
            guard let self = self, let a = activity else { return }
            let inCar = a.automotive && a.confidence != .low
            if self.wasInCar && !inCar && a.stationary {
                self.log("CoreMotion: Just parked! Requesting location...")
                self.locationManager.requestLocation()
            }
            self.wasInCar = inCar
        }
        log("Monitoring started!")
    }
    func testParkHere() {
        log("TEST: Simulating park here — requesting location...")
        locationManager.requestLocation()
    }
    func testNotificationIn10Seconds() {
        log("TEST: Scheduling test notification in 10 seconds...")
        UNUserNotificationCenter.current().removeAllPendingNotificationRequests()
        let content = UNMutableNotificationContent()
        content.title = "ParkSafe Test Alert"
        content.body  = "Notifications are working!"
        content.sound = .default
        let trigger = UNTimeIntervalNotificationTrigger(timeInterval: 10, repeats: false)
        UNUserNotificationCenter.current().add(
            UNNotificationRequest(identifier: "ps_test", content: content, trigger: trigger)
        ) { [weak self] error in
            if let e = error { self?.log("TEST ERROR: \(e)") }
            else { self?.log("TEST: Done! Lock screen and wait 10 seconds.") }
        }
    }
    func clearParked() {
        defaults.removeObject(forKey: kLat); defaults.removeObject(forKey: kLon)
        defaults.removeObject(forKey: kStreet); defaults.removeObject(forKey: kTime)
        UNUserNotificationCenter.current().removeAllPendingNotificationRequests()
        DispatchQueue.main.async {
            self.parkedCoordinate = nil
            self.parkedStreetName = "Not detected yet"
            self.parkedAt = nil
            self.isParked = false
        }
        log("Parked location cleared")
    }
    func locationManager(_ manager: CLLocationManager, didVisit visit: CLVisit) {
        let isArrival = visit.departureDate == Date.distantFuture
        log("CLVisit \(isArrival ? "ARRIVAL" : "departure") lat:\(visit.coordinate.latitude) lon:\(visit.coordinate.longitude)")
        guard isArrival else { return }
        saveParked(coordinate: visit.coordinate)
        scheduleAlerts(for: visit.coordinate)
    }
    func locationManager(_ manager: CLLocationManager, didUpdateLocations locations: [CLLocation]) {
        guard let loc = locations.last else { return }
        log("Location update: \(loc.coordinate.latitude), \(loc.coordinate.longitude) acc:\(Int(loc.horizontalAccuracy))m")
        saveParked(coordinate: loc.coordinate)
        scheduleAlerts(for: loc.coordinate)
    }
    func locationManager(_ manager: CLLocationManager, didFailWithError error: Error) {
        log("Location ERROR: \(error.localizedDescription)")
    }
    func locationManager(_ manager: CLLocationManager, didChangeAuthorization status: CLAuthorizationStatus) {
        switch status {
        case .authorizedWhenInUse: log("Permission: When In Use granted"); startMonitoring()
        case .authorizedAlways:    log("Permission: Always granted"); startMonitoring()
        case .denied:              log("Permission: DENIED - please enable in Settings")
        default:                   log("Permission status: \(status.rawValue)")
        }
    }
    private func saveParked(coordinate: CLLocationCoordinate2D) {
        defaults.set(coordinate.latitude,  forKey: kLat)
        defaults.set(coordinate.longitude, forKey: kLon)
        defaults.set(Date(),               forKey: kTime)
        DispatchQueue.main.async {
            self.parkedCoordinate = coordinate
            self.parkedAt = Date()
            self.isParked = true
        }
        log("Saved parked: \(coordinate.latitude), \(coordinate.longitude)")
        CLGeocoder().reverseGeocodeLocation(
            CLLocation(latitude: coordinate.latitude, longitude: coordinate.longitude)
        ) { [weak self] placemarks, _ in
            guard let self = self else { return }
            let street = placemarks?.first?.thoroughfare ?? "Unknown Street"
            self.defaults.set(street, forKey: self.kStreet)
            DispatchQueue.main.async { self.parkedStreetName = street }
            self.log("Street: \(street)")
        }
    }
    private func loadSaved() {
        let lat = defaults.double(forKey: kLat), lon = defaults.double(forKey: kLon)
        guard lat != 0, lon != 0 else { log("No saved location"); return }
        parkedCoordinate = CLLocationCoordinate2D(latitude: lat, longitude: lon)
        parkedStreetName = defaults.string(forKey: kStreet) ?? "Unknown"
        parkedAt = defaults.object(forKey: kTime) as? Date
        isParked = true
        log("Loaded saved: \(parkedStreetName)")
    }
    private func scheduleAlerts(for coordinate: CLLocationCoordinate2D) {
        log("Checking schedule for parked location...")
        guard let url = Bundle.main.url(forResource: "san_francisco", withExtension: "json"),
              let data = try? Data(contentsOf: url),
              let json = try? JSONSerialization.jsonObject(with: data) as? [String: Any],
              let streets = json["streets"] as? [[String: Any]] else {
            log("ERROR: Could not load san_francisco.json")
            return
        }
        let parkedLoc = CLLocation(latitude: coordinate.latitude, longitude: coordinate.longitude)
        let weekday = Calendar.current.component(.weekday, from: Date())
        log("Checking \(streets.count) streets, weekday=\(weekday)...")
        var found = false
        for street in streets {
            guard let lat  = street["lat"] as? Double,
                  let lon  = street["lon"] as? Double,
                  let name = street["name"] as? String,
                  let sched = street["schedule"] as? [[String: Any]] else { continue }
            let dist = parkedLoc.distance(from: CLLocation(latitude: lat, longitude: lon))
            guard dist < 80 else { continue }
            log("Match: \(name) (\(Int(dist))m away)")
            found = true
            for entry in sched {
                guard let days = entry["days"] as? [Int],
                      let startHour = entry["startHour"] as? Int,
                      days.contains(weekday) else { continue }
                log("Cleaning today at \(startHour):00 — scheduling alerts!")
                UNUserNotificationCenter.current().removeAllPendingNotificationRequests()
                fireAlert(id: "ps_2h",  title: "Move Your Car Soon",    body: "\(name) cleaning in 2 hours.",    hour: startHour-2, min: 0)
                fireAlert(id: "ps_1h",  title: "Move Your Car!",         body: "\(name) cleaning in 1 hour!",    hour: startHour-1, min: 0)
                fireAlert(id: "ps_30m", title: "Move NOW!",              body: "\(name) cleaning in 30 minutes!", hour: startHour,   min: -30)
            }
            break
        }
        if !found { log("No tracked street within 80m — no alerts") }
    }
    private func fireAlert(id: String, title: String, body: String, hour: Int, min: Int) {
        var h = hour, m = min
        if m < 0 { h -= 1; m += 60 }
        var comps = DateComponents(); comps.hour = h; comps.minute = m
        guard let fireDate = Calendar.current.date(from: comps), fireDate > Date() else {
            log("Alert \(id) skipped — time passed")
            return
        }
        let content = UNMutableNotificationContent()
        content.title = title; content.body = body; content.sound = .default
        UNUserNotificationCenter.current().add(
            UNNotificationRequest(identifier: id, content: content,
                                  trigger: UNCalendarNotificationTrigger(dateMatching: comps, repeats: false))
        ) { [weak self] e in
            if let e = e { self?.log("Alert \(id) ERROR: \(e)") }
            else { self?.log("Alert \(id) set for \(h):\(String(format:"%02d",m)) ✅") }
        }
    }
}

// MARK: - Debug View
struct ParkingDebugView: View {
    @EnvironmentObject var detector: ParkingDetector
    var body: some View {
        NavigationView {
            ScrollView {
                VStack(spacing: 16) {
                    VStack(alignment: .leading, spacing: 10) {
                        Text("Parking Status").font(.headline).foregroundColor(.white)
                        HStack {
                            Circle().fill(detector.isParked ? Color.green : Color.red).frame(width: 12, height: 12)
                            Text(detector.isParked ? "Parked" : "Not parked").foregroundColor(.white)
                        }
                        if detector.isParked {
                            Text("Street: \(detector.parkedStreetName)").foregroundColor(.green)
                            if let c = detector.parkedCoordinate {
                                Text("Lat: \(String(format: "%.6f", c.latitude))").foregroundColor(.gray).font(.caption)
                                Text("Lon: \(String(format: "%.6f", c.longitude))").foregroundColor(.gray).font(.caption)
                            }
                        }
                    }
                    .padding().frame(maxWidth: .infinity, alignment: .leading)
                    .background(Color(white: 0.12)).cornerRadius(16)
                    VStack(spacing: 12) {
                        Text("Test Controls").font(.headline).foregroundColor(.white).frame(maxWidth: .infinity, alignment: .leading)
                        Button { detector.testParkHere() } label: {
                            Label("Simulate: I Parked Here", systemImage: "car.fill")
                                .frame(maxWidth: .infinity).padding()
                                .background(Color.blue).foregroundColor(.white).cornerRadius(14)
                        }
                        Button { detector.testNotificationIn10Seconds() } label: {
                            Label("Test Notification (10 sec)", systemImage: "bell.fill")
                                .frame(maxWidth: .infinity).padding()
                                .background(Color.orange).foregroundColor(.white).cornerRadius(14)
                        }
                        Button { detector.clearParked() } label: {
                            Label("Clear Parked Location", systemImage: "xmark.circle.fill")
                                .frame(maxWidth: .infinity).padding()
                                .background(Color.red.opacity(0.8)).foregroundColor(.white).cornerRadius(14)
                        }
                    }
                    .padding().background(Color(white: 0.12)).cornerRadius(16)
                    VStack(alignment: .leading, spacing: 8) {
                        HStack {
                            Text("Debug Log").font(.headline).foregroundColor(.white)
                            Spacer()
                            Button("Clear") { detector.debugLog.removeAll() }.foregroundColor(.gray).font(.caption)
                        }
                        if detector.debugLog.isEmpty {
                            Text("No logs yet...").foregroundColor(.gray).font(.caption)
                        } else {
                            ForEach(detector.debugLog, id: \.self) { entry in
                                Text(entry).font(.system(size: 11, design: .monospaced))
                                    .foregroundColor(.green).frame(maxWidth: .infinity, alignment: .leading)
                            }
                        }
                    }
                    .padding().background(Color(white: 0.08)).cornerRadius(16)
                }
                .padding()
            }
            .background(Color(white: 0.07).ignoresSafeArea())
            .navigationTitle("Debug Panel")
            .navigationBarTitleDisplayMode(.inline)
        }
    }
}

// MARK: - App Entry Point
@main
struct ParkSafeSFApp: App {
    @StateObject private var scheduleStore       = ScheduleStore()
    @StateObject private var locationManager     = LocationManager()
    @StateObject private var notificationManager = NotificationManager()
    @StateObject private var parkingDetector     = ParkingDetector.shared
    @AppStorage("hasCompletedOnboarding") private var hasCompletedOnboarding = false
    init() {
        UNUserNotificationCenter.current().removeAllPendingNotificationRequests()
        UNUserNotificationCenter.current().removeAllDeliveredNotifications()
        ParkingDetector.shared.requestPermissions()
        ParkingDetector.shared.startMonitoring()
    }
    var body: some Scene {
        WindowGroup {
            Group {
                if hasCompletedOnboarding {
                    ContentView()
                } else {
                    OnboardingView(hasCompletedOnboarding: $hasCompletedOnboarding)
                }
            }
            .environmentObject(scheduleStore)
            .environmentObject(locationManager)
            .environmentObject(notificationManager)
            .environmentObject(parkingDetector)
        }
    }
}
SWIFT_EOF

