                  'A1000003 /* ScheduleStore.swift in Sources */ = {isa = PBXBuildFile; fileRef = A2000003; };\n\t\tA1000008 /* CityStore.swift in Sources */ = {isa = PBXBuildFile; fileRef = A2000008; };'
              )
