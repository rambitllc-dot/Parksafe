              content = content.replace('A1000003 /* ScheduleStore.swift in Sources */,', 'A1000003 /* ScheduleStore.swift in Sources */,\n\t\t\t\tA1000008 /* CityStore.swift in Sources */,')
          if 'ParkingDetector' not in content:
              content = content.replace(
                  'A2000003 /* ScheduleStore.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = ScheduleStore.swift; sourceTree = "<group>"; };',
                  'A2000003 /* ScheduleStore.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = ScheduleStore.swift; sourceTree = "<group>"; };\n\t\tA2000009 /* ParkingDetector.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = ParkingDetector.swift; sourceTree = "<group>"; };'
