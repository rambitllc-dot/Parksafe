workflows:
  ios-app-store:
    name: ParkSafe — App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios
      vars:
        XCODE_SCHEME: "ParkSafeSF"
        BUNDLE_ID: "com.rambitllc.parksafe"
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.rambitllc.parksafe

    scripts:
      - name: Unzip project
        script: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -1)
          echo "Found zip: $ZIP_FILE"
          unzip -o "$ZIP_FILE"
          echo "=== After unzip ==="
          ls -la
          find . -maxdepth 4 -name "*.xcodeproj" | head -5

      - name: Fix project
        script: |
          # Find project root dynamically
          XCODEPROJ=$(find . -maxdepth 4 -name "*.xcodeproj" | grep -v "__MACOSX" | head -1)
          PROJECT_ROOT=$(dirname "$XCODEPROJ")
          APP_DIR="$PROJECT_ROOT/ParkSafeSF"
          echo "Project root: $PROJECT_ROOT"
          echo "App dir: $APP_DIR"

          # Copy CityStore if needed
          if [ -f "CityStore.swift" ]; then
            cp CityStore.swift "$APP_DIR/Services/CityStore.swift"
            echo "CityStore copied"
          fi

          # Copy ParkingDetector if present
          if [ -f "ParkingDetector.swift" ]; then
            cp ParkingDetector.swift "$APP_DIR/Services/ParkingDetector.swift"
            echo "ParkingDetector copied"
          fi

          # Fix ParkSafeSFApp.swift
          cat > "$APP_DIR/ParkSafeSFApp.swift" << 'SWIFT_EOF'
          import SwiftUI
          import UserNotifications
          @main
          struct ParkSafeSFApp: App {
              @StateObject private var scheduleStore       = ScheduleStore()
              @StateObject private var locationManager     = LocationManager()
              @StateObject private var notificationManager = NotificationManager()
              @AppStorage("hasCompletedOnboarding") private var hasCompletedOnboarding = false
              var body: some Scene {
                  WindowGroup {
                      Group {
                          if hasCompletedOnboarding {
                              ContentView()
                          } else {
                              OnboardingView(hasCompletedOnboarding: $hasCompletedOnboarding)
                          }
                      }
                      .environmentObject(scheduleStore)
                      .environmentObject(locationManager)
                      .environmentObject(notificationManager)
                  }
              }
          }
          SWIFT_EOF

          # Patch pbxproj
          python3 << PYEOF
          import re, os
          pbx = "$XCODEPROJ/project.pbxproj"
          with open(pbx) as f:
              content = f.read()
          if 'CityStore' not in content:
              content = content.replace(
                  'A2000003 /* ScheduleStore.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = ScheduleStore.swift; sourceTree = "<group>"; };',
                  'A2000003 /* ScheduleStore.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = ScheduleStore.swift; sourceTree = "<group>"; };\n\t\tA2000008 /* CityStore.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = CityStore.swift; sourceTree = "<group>"; };'
              )
              content = content.replace(
                  'A1000003 /* ScheduleStore.swift in Sources */ = {isa = PBXBuildFile; fileRef = A2000003; };',
                  'A1000003 /* ScheduleStore.swift in Sources */ = {isa = PBXBuildFile; fileRef = A2000003; };\n\t\tA1000008 /* CityStore.swift in Sources */ = {isa = PBXBuildFile; fileRef = A2000008; };'
              )
              content = content.replace('A2000003 /* ScheduleStore.swift */,', 'A2000003 /* ScheduleStore.swift */,\n\t\t\t\tA2000008 /* CityStore.swift */,')
              content = content.replace('A1000003 /* ScheduleStore.swift in Sources */,', 'A1000003 /* ScheduleStore.swift in Sources */,\n\t\t\t\tA1000008 /* CityStore.swift in Sources */,')
          content = re.sub(r'PRODUCT_BUNDLE_IDENTIFIER = [^;]+;', 'PRODUCT_BUNDLE_IDENTIFIER = com.rambitllc.parksafe;', content)
          with open(pbx, 'w') as f:
              f.write(content)
          print('Patched:', pbx)
          PYEOF

      - name: Bump build number
        script: |
          INFO_PLIST=$(find . -name "Info.plist" -not -path "*__MACOSX*" | head -1)
          echo "Found: $INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 4" "$INFO_PLIST"
          echo "Build number set to: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' $INFO_PLIST)"

      - name: Set up App Store Connect API key
        script: |
          mkdir -p ~/.appstoreconnect/private_keys
          KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_KEY_ID.p8
          printf '%s' "$APP_STORE_PRIVATE_KEY" > "$KEY_PATH"
          echo "Key size: $(wc -c < $KEY_PATH) bytes"

      - name: Build and archive
        script: |
          XCODEPROJ=$(find . -maxdepth 4 -name "*.xcodeproj" | grep -v "__MACOSX" | head -1)
          echo "Building: $XCODEPROJ"

          PROFILE=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" 2>/dev/null | head -1)
          UUID=$(security cms -D -i "$PROFILE" 2>/dev/null | python3 -c "import sys,plistlib; d=plistlib.loads(sys.stdin.buffer.read()); print(d['UUID'])" 2>/dev/null)
          echo "Profile UUID: $UUID"

          xcodebuild \
            -project "$XCODEPROJ" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$CM_BUILD_DIR/ParkSafe.xcarchive" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            clean archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$UUID" \
            OTHER_CODE_SIGN_FLAGS="--keychain /Library/Keychains/System.keychain" \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
            COPY_PHASE_STRIP=NO \
            STRIP_INSTALLED_PRODUCT=NO

          echo "Archive size: $(du -sh $CM_BUILD_DIR/ParkSafe.xcarchive)"
          find "$CM_BUILD_DIR/ParkSafe.xcarchive" -name "ParkSafeSF" -not -name "*.swift" | xargs ls -la

      - name: Export IPA
        script: |
          PROFILE=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" 2>/dev/null | head -1)
          UUID=$(security cms -D -i "$PROFILE" 2>/dev/null | python3 -c "import sys,plistlib; d=plistlib.loads(sys.stdin.buffer.read()); print(d['UUID'])" 2>/dev/null)

          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.rambitllc.parksafe</key>
              <string>$UUID</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/ParkSafe.xcarchive" \
            -exportPath "$CM_EXPORT_DIR" \
            -exportOptionsPlist /tmp/ExportOptions.plist

          IPA=$(find "$CM_EXPORT_DIR" -name "*.ipa" | head -1)
          echo "IPA size: $(du -sh $IPA)"
          unzip -l "$IPA" | grep "ParkSafeSF.app/ParkSafeSF$"

    artifacts:
      - $CM_EXPORT_DIR/*.ipa
      - $CM_BUILD_DIR/*.xcarchive

    publishing:
      app_store_connect:
        api_key: $APP_STORE_PRIVATE_KEY
        key_id: $APP_STORE_KEY_ID
        issuer_id: $APP_STORE_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: false
